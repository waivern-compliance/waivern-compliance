name: security_domains
version: 1.0.0
description: >
  Vocabulary of security domain labels for document classification by
  DocumentEvidenceExtractor. One rule per SecurityDomain enum value defined in
  waivern-core. The domain names are used directly in LLM prompts; the
  security_domain field is Pydantic-validated against the enum at load time.
rules:
  - name: authentication
    description: >
      Controls for verifying and managing identity — login mechanisms, MFA,
      password policies, session management, and identity provider integrations.
    security_domain: authentication

  - name: encryption
    description: >
      Controls for protecting data through cryptographic means — encryption at
      rest, encryption in transit, key management, and algorithm selection.
    security_domain: encryption

  - name: access_control
    description: >
      Controls for managing who can access resources — RBAC, ABAC, least
      privilege, permission models, and authorisation frameworks.
    security_domain: access_control

  - name: logging_monitoring
    description: >
      Controls for recording and reviewing security-relevant events — audit
      logs, security event monitoring, alerting, and log retention policies.
    security_domain: logging_monitoring

  - name: vulnerability_management
    description: >
      Controls for identifying and remediating security weaknesses — patch
      management, SAST/DAST tooling, dependency scanning, and secure coding
      practices such as input validation and injection prevention.
    security_domain: vulnerability_management

  - name: data_protection
    description: >
      Controls for handling personal and sensitive data — data minimisation,
      anonymisation, pseudonymisation, data classification, and retention
      policies under GDPR and similar regulations.
    security_domain: data_protection

  - name: network_security
    description: >
      Controls for protecting network infrastructure — firewalls, TLS
      configuration, certificate management, network segmentation, and
      secure communication protocols.
    security_domain: network_security

  - name: physical_security
    description: >
      Controls for protecting physical premises and hardware — access to
      server rooms, equipment disposal, clean desk policies, and physical
      entry controls.
    security_domain: physical_security

  - name: people_controls
    description: >
      Controls related to personnel security and human risk — background
      checks, security awareness training, acceptable use policies, and
      handling of elevated-sensitivity personal data categories.
    security_domain: people_controls

  - name: supplier_management
    description: >
      Controls for managing third-party supplier and vendor security risks —
      data processing agreements, supplier assessments, and contractual
      security obligations.
    security_domain: supplier_management

  - name: incident_management
    description: >
      Controls for detecting, responding to, and recovering from security
      incidents — incident response plans, breach notification procedures,
      and forensic capabilities.
    security_domain: incident_management

  - name: business_continuity
    description: >
      Controls for maintaining operations under adverse conditions — disaster
      recovery plans, backup policies, RTO/RPO targets, and resilience testing.
    security_domain: business_continuity
