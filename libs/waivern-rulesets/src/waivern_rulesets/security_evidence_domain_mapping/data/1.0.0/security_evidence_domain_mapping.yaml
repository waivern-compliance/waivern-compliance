# Security Evidence Domain Mapping Ruleset
# Maps processing purpose slugs and personal data indicator categories to
# framework-agnostic security domains for use by SecurityEvidenceNormaliser.

name: security_evidence_domain_mapping
version: 1.0.0
description: Maps indicator findings to security evidence domains for downstream compliance assessors

# Master list of valid processing purpose slugs
# DEPENDENCY: Must stay in sync with purpose_slugs in processing_purposes/1.0.0.
# When adding or removing a purpose there, update this list and add or remove a rule below.
# The test test_all_purpose_slugs_are_covered will fail if any slug is unmapped.
purpose_slugs:
  - ai_model_training
  - ai_bias_testing
  - ai_model_refinement
  - ai_performance_testing
  - ai_security_testing
  - ai_compliance_management
  - product_service_delivery
  - customer_service_support
  - product_customisation
  - user_identity_login
  - payment_billing
  - behavioral_analytics
  - dynamic_personalisation
  - consumer_marketing
  - third_party_targeted_marketing
  - third_party_marketing
  - security_fraud_prevention
  - audit_logging
  - access_control_management
  - network_access_control
  - supplier_vendor_management
  - incident_response
  - data_backup_recovery
  - input_validation_sanitisation

# Master list of valid personal data indicator categories
# DEPENDENCY: Must stay in sync with categories in personal_data_indicator/1.0.0.
# When adding or removing a category there, update this list and add or remove a rule below.
# The test test_all_categories_are_covered will fail if any category is unmapped.
indicator_categories:
  - name
  - email
  - phone
  - address
  - date_of_birth
  - government_id
  - user_identifier
  - account
  - subscription
  - payment
  - financial
  - user_activity
  - analytics
  - device
  - network
  - browser
  - cookie
  - inferred
  - preference
  - location
  - precise_location
  - user_content
  - health
  - political
  - racial_ethnic
  - religious
  - genetic
  - biometric
  - sexual_orientation

# Master list of valid cryptographic algorithm identifiers
# DEPENDENCY: Must stay in sync with algorithm values in crypto_quality_indicator/1.0.0.
# When adding or removing an algorithm there, update this list and add or remove entries
# to the cryptographic_algorithms rule below.
# The test test_all_algorithm_values_are_covered will fail if any algorithm is unmapped.
algorithm_values:
  - md5
  - sha1
  - des
  - rc4
  - blowfish
  - aes_128
  - bcrypt
  - argon2
  - scrypt
  - pbkdf2
  - aes_256
  - chacha20
  - sha256
  - sha512
  - sha3
  - hmac_sha256
  - rsa_2048_plus
  - rsa_1024
  - ecdsa
  - sodium
  - php_password_hash
  - aes_gcm

# Master list of valid service integration category slugs
# DEPENDENCY: Must stay in sync with service_categories in service_integrations/1.0.0.
# When adding or removing a category there, update this list and add or remove a rule below.
# The test test_all_service_categories_are_covered will fail if any category is unmapped.
service_category_values:
  - cloud_infrastructure
  - communication
  - crm
  - identity_management
  - monitoring_observability
  - payment_processing
  - user_analytics
  - social_media
  - ai_ml_services
  - media_processing
  - healthcare_integrations

# Master list of valid data collection type slugs
# DEPENDENCY: Must stay in sync with collection_type_categories in data_collection/1.0.0.
# When adding or removing a type there, update this list and add or remove a rule below.
# The test test_all_collection_types_are_covered will fail if any type is unmapped.
collection_type_values:
  - form_data
  - url_parameters
  - cookies
  - session_data
  - html_forms
  - client_storage
  - file_upload
  - database_query
  - database_connection

rules:
  # =============================================================================
  # Purpose-based mappings
  # Maps processing_purpose_indicator.purpose slugs to security domains
  # =============================================================================

  - name: user_identity_and_login
    description: Authentication and identity management purposes map to the authentication domain
    source_type: purpose
    indicator_values:
      - user_identity_login
    security_domain: authentication

  - name: security_and_testing
    description: Security testing, fraud prevention, and vulnerability assessment purposes
    source_type: purpose
    indicator_values:
      - security_fraud_prevention
      - ai_performance_testing
      - ai_security_testing
    security_domain: vulnerability_management

  - name: data_driven_processing
    description: Data collection, analysis, marketing, and AI processing purposes
    source_type: purpose
    indicator_values:
      - ai_model_training
      - ai_bias_testing
      - ai_model_refinement
      - ai_compliance_management
      - product_service_delivery
      - customer_service_support
      - product_customisation
      - payment_billing
      - behavioral_analytics
      - dynamic_personalisation
      - consumer_marketing
      - third_party_targeted_marketing
      - third_party_marketing
    security_domain: data_protection

  # =============================================================================
  # Category-based mappings
  # Maps personal_data_indicator.category values to security domains
  # =============================================================================

  - name: sensitive_personal_data
    description: Government identifiers and Article 9 special category data requiring elevated protection
    source_type: category
    indicator_values:
      - government_id
      - health
      - political
      - racial_ethnic
      - religious
      - genetic
      - biometric
      - sexual_orientation
    security_domain: data_protection
    secondary_domain: people_controls

  - name: standard_personal_data
    description: Standard personal data categories mapping to data protection domain
    source_type: category
    indicator_values:
      - name
      - email
      - phone
      - address
      - date_of_birth
      - user_identifier
      - account
      - subscription
      - payment
      - financial
      - user_activity
      - analytics
      - device
      - network
      - browser
      - cookie
      - inferred
      - preference
      - location
      - precise_location
      - user_content
    security_domain: data_protection

  # =============================================================================
  # Service category-based mappings
  # Maps service_integration_indicator.service_category slugs to security domains
  # =============================================================================

  - name: third_party_infrastructure
    description: Cloud infrastructure and media processing services map to supplier management
    source_type: service_category
    indicator_values:
      - cloud_infrastructure
      - media_processing
    security_domain: supplier_management

  - name: third_party_communication
    description: Communication and messaging services map to supplier management
    source_type: service_category
    indicator_values:
      - communication
    security_domain: supplier_management

  - name: third_party_identity
    description: Identity management services map to supplier management with authentication secondary
    source_type: service_category
    indicator_values:
      - identity_management
    security_domain: supplier_management
    secondary_domain: authentication

  - name: third_party_payment
    description: Payment processing services map to data protection with supplier management secondary
    source_type: service_category
    indicator_values:
      - payment_processing
    security_domain: data_protection
    secondary_domain: supplier_management

  - name: third_party_analytics
    description: User analytics and social media services map to data protection
    source_type: service_category
    indicator_values:
      - user_analytics
      - social_media
    security_domain: data_protection

  - name: third_party_ai
    description: AI and machine learning services map to data protection
    source_type: service_category
    indicator_values:
      - ai_ml_services
    security_domain: data_protection

  - name: third_party_crm
    description: CRM and marketing automation services map to data protection with supplier management secondary
    source_type: service_category
    indicator_values:
      - crm
    security_domain: data_protection
    secondary_domain: supplier_management

  - name: third_party_monitoring
    description: Monitoring and observability services map to supplier management
    source_type: service_category
    indicator_values:
      - monitoring_observability
    security_domain: supplier_management

  - name: third_party_healthcare
    description: Healthcare integration services map to data protection with people controls secondary
    source_type: service_category
    indicator_values:
      - healthcare_integrations
    security_domain: data_protection
    secondary_domain: people_controls

  # =============================================================================
  # Collection type-based mappings
  # Maps data_collection_indicator.collection_type slugs to security domains
  # =============================================================================

  - name: user_input_collection
    description: Form data, URL parameters, and HTML form inputs map to data protection
    source_type: collection_type
    indicator_values:
      - form_data
      - url_parameters
      - html_forms
    security_domain: data_protection

  - name: client_storage_collection
    description: Cookies, session data, and client storage map to data protection
    source_type: collection_type
    indicator_values:
      - cookies
      - session_data
      - client_storage
    security_domain: data_protection

  - name: file_upload_collection
    description: File upload processing maps to vulnerability management (attack surface)
    source_type: collection_type
    indicator_values:
      - file_upload
    security_domain: vulnerability_management

  - name: database_access_collection
    description: Database queries and connections map to data protection
    source_type: collection_type
    indicator_values:
      - database_query
      - database_connection
    security_domain: data_protection

  # =============================================================================
  # Security operations mappings
  # Maps the new security operations and controls purposes to their domains
  # =============================================================================

  - name: audit_and_logging
    description: Audit logging and event tracking maps to the logging and monitoring domain
    source_type: purpose
    indicator_values:
      - audit_logging
    security_domain: logging_monitoring

  - name: access_control_and_permissions
    description: Access control and permissions management maps to the access control domain
    source_type: purpose
    indicator_values:
      - access_control_management
    security_domain: access_control

  - name: network_security_controls
    description: Network access control (IP restrictions, firewalls, TLS) maps to network security
    source_type: purpose
    indicator_values:
      - network_access_control
    security_domain: network_security

  - name: supplier_and_vendor_integrations
    description: Third-party supplier and vendor integrations map to supplier management
    source_type: purpose
    indicator_values:
      - supplier_vendor_management
    security_domain: supplier_management

  - name: incident_and_error_management
    description: Incident response and error management maps to incident management
    source_type: purpose
    indicator_values:
      - incident_response
    security_domain: incident_management

  - name: backup_and_recovery
    description: Data backup and disaster recovery maps to business continuity
    source_type: purpose
    indicator_values:
      - data_backup_recovery
    security_domain: business_continuity

  - name: input_validation_and_sanitisation
    description: Input validation and sanitisation extends vulnerability management evidence
    source_type: purpose
    indicator_values:
      - input_validation_sanitisation
    security_domain: vulnerability_management

  # =============================================================================
  # Algorithm-based mappings
  # Maps crypto_quality_indicator.algorithm values to security domains
  # =============================================================================

  - name: cryptographic_algorithms
    description: All cryptographic algorithm detections map to the encryption domain regardless of quality rating; polarity (positive/negative) carries the quality signal
    source_type: algorithm
    indicator_values:
      - md5
      - sha1
      - des
      - rc4
      - blowfish
      - aes_128
      - bcrypt
      - argon2
      - scrypt
      - pbkdf2
      - aes_256
      - chacha20
      - sha256
      - sha512
      - sha3
      - hmac_sha256
      - rsa_2048_plus
      - rsa_1024
      - ecdsa
      - sodium
      - php_password_hash
      - aes_gcm
    security_domain: encryption
