# Crypto Quality Indicator Ruleset
# Detects cryptographic algorithm usage and rates implementation quality.
#
# quality_rating values:
#   strong     - Modern, recommended algorithm (positive polarity)
#   weak       - Functional but below current best-practice (negative polarity)
#   deprecated - Cryptographically broken or insecure (negative polarity)

name: crypto_quality_indicator
version: 1.0.0
description: Ruleset for detecting cryptographic algorithm usage and evaluating implementation quality

rules:
  # ===========================================================================
  # Deprecated — cryptographically broken
  # ===========================================================================

  - name: MD5
    description: MD5 hash function (collision attacks demonstrated, unsuitable for security use)
    algorithm: md5
    quality_rating: deprecated
    patterns:
      - md5
      - md5_hash
      - md5_digest

  - name: SHA-1
    description: SHA-1 hash function (collision attacks demonstrated, deprecated by NIST)
    algorithm: sha1
    quality_rating: deprecated
    patterns:
      - sha1
      - sha_1

  - name: DES
    description: Data Encryption Standard (56-bit key, brute-forceable)
    algorithm: des
    quality_rating: deprecated
    patterns:
      - des_encrypt
      - des_decrypt
      - triple_des
      - 3des

  - name: RC4
    description: RC4 stream cipher (known biases, prohibited in TLS 1.3)
    algorithm: rc4
    quality_rating: deprecated
    patterns:
      - rc4
      - arcfour

  # ===========================================================================
  # Weak — not broken but below current best practice
  # ===========================================================================

  - name: Blowfish
    description: Blowfish cipher (64-bit block size, birthday-attack risk; superseded by AES)
    algorithm: blowfish
    quality_rating: weak
    patterns:
      - blowfish

  - name: AES-128
    description: AES with 128-bit key (secure but AES-256 preferred for new systems)
    algorithm: aes_128
    quality_rating: weak
    patterns:
      - aes_128
      - aes128

  # ===========================================================================
  # Strong — current best practice
  # ===========================================================================

  - name: bcrypt
    description: bcrypt password-hashing function (adaptive cost, salted)
    algorithm: bcrypt
    quality_rating: strong
    patterns:
      - bcrypt

  - name: Argon2
    description: Argon2 key derivation function (winner of Password Hashing Competition)
    algorithm: argon2
    quality_rating: strong
    patterns:
      - argon2

  - name: scrypt
    description: scrypt key derivation function (memory-hard, resistant to hardware attacks)
    algorithm: scrypt
    quality_rating: strong
    patterns:
      - scrypt

  - name: PBKDF2
    description: PBKDF2 key derivation function (NIST recommended, widely supported)
    algorithm: pbkdf2
    quality_rating: strong
    patterns:
      - pbkdf2

  - name: AES-256
    description: AES with 256-bit key (current standard for symmetric encryption)
    algorithm: aes_256
    quality_rating: strong
    patterns:
      - aes_256
      - aes256

  - name: ChaCha20
    description: ChaCha20 stream cipher (modern, constant-time, side-channel resistant)
    algorithm: chacha20
    quality_rating: strong
    patterns:
      - chacha20

  # ===========================================================================
  # Strong — SHA-2 / SHA-3 hash families
  # ===========================================================================

  - name: SHA-256
    description: SHA-256 hash function (NIST standard; widely used for signatures and integrity checks)
    algorithm: sha256
    quality_rating: strong
    patterns:
      - sha256
      - sha_256
      - sha-256
      - sha2

  - name: SHA-512
    description: SHA-512 hash function (larger SHA-2 variant; preferred where extra margin is needed)
    algorithm: sha512
    quality_rating: strong
    patterns:
      - sha512
      - sha_512
      - sha-512

  - name: SHA-3
    description: SHA-3 / Keccak hash function (NIST standard; structurally distinct from SHA-2 family)
    algorithm: sha3
    quality_rating: strong
    patterns:
      - sha3
      - sha3_256
      - sha3_512
      - sha-3
      - keccak

  # ===========================================================================
  # Strong — HMAC and asymmetric algorithms
  # ===========================================================================

  - name: HMAC-SHA256
    description: HMAC keyed-hash (standard for webhook signature verification and API request signing)
    algorithm: hmac_sha256
    quality_rating: strong
    patterns:
      - hmac
      - hash_hmac
      - hmac_sha256
      - hmac_sha512

  - name: RSA-2048+
    description: RSA with 2048-bit or larger key (adequate for asymmetric encryption and digital signatures)
    algorithm: rsa_2048_plus
    quality_rating: strong
    patterns:
      - rsa_2048
      - rsa2048
      - rsa_4096
      - rsa4096
      - rsa_3072
      - rsa3072

  - name: ECDSA/Ed25519
    description: Elliptic-curve digital signatures (compact, fast, strong; preferred for modern APIs and OAuth)
    algorithm: ecdsa
    quality_rating: strong
    patterns:
      - ecdsa
      - ecdh
      - ed25519
      - curve25519
      - secp256r1
      - p-256
      - p-384
      - elliptic_curve

  # ===========================================================================
  # Strong — PHP-native crypto APIs
  # ===========================================================================

  - name: libsodium
    description: PHP libsodium (sodium_* extension); modern opinionated crypto library with no weak primitives
    algorithm: sodium
    quality_rating: strong
    patterns:
      - sodium_
      - libsodium
      - sodium_crypto
      - sodium_secretbox
      - sodium_box
      - sodium_sign

  - name: PHP password_hash
    description: PHP password_hash() / password_verify() API; delegates to bcrypt or Argon2 via PASSWORD_DEFAULT
    algorithm: php_password_hash
    quality_rating: strong
    patterns:
      - password_hash
      - password_verify
      - password_needs_rehash

  - name: AES-GCM
    description: AES in Galois/Counter Mode (authenticated encryption; combines confidentiality and integrity)
    algorithm: aes_gcm
    quality_rating: strong
    patterns:
      - aes_gcm
      - aes-gcm
      - aesgcm
      - gcm_tag

  # ===========================================================================
  # Deprecated — weak key sizes
  # ===========================================================================

  - name: RSA-1024
    description: RSA with 1024-bit key (below NIST minimum recommendation since 2010; considered broken)
    algorithm: rsa_1024
    quality_rating: deprecated
    patterns:
      - rsa_1024
      - rsa1024
