# ISO 27001 Domains Ruleset
# One rule per Annex A clause. Each rule carries the five ISO 27001 control attributes
# and guidance text used by ControlAssessor to structure LLM prompts and populate
# control_assessment schema fields.
#
# DISCLAIMER: The guidance text in this file is derived from publicly available
# summaries and paraphrases of ISO 27001:2022. It is NOT a copy of the official
# ISO 27001 standard text, which is a licensed publication. For authoritative,
# verbatim control text, switch to the rag/ provider URI:
#   domain_ruleset: "rag/iso27001_domains/1.0.0"

name: iso27001_domains
version: 1.0.0
description: ISO 27001 Annex A clause definitions with control attributes and LLM guidance text

# Master list of valid security domain values
# DEPENDENCY: Must stay in sync with SecurityDomain enum in waivern-security-evidence.
# When adding or removing a domain there, update this list and re-check all rules below.
# The test test_all_security_domains_are_covered will fail if any domain is unmapped.
security_domains:
  - authentication
  - encryption
  - access_control
  - logging_monitoring
  - vulnerability_management
  - data_protection
  - network_security
  - physical_security
  - people_controls
  - supplier_management
  - incident_management
  - business_continuity

rules:

  # ---------------------------------------------------------------------------
  # A.5 — Organisational Controls (37 controls)
  # Covers policies, roles, asset management, access control policy, supplier
  # relationships, incident management, business continuity, and compliance.
  # ---------------------------------------------------------------------------

  - name: organisational_controls
    description: ISO 27001 Annex A.5 organisational controls covering governance, asset management, and policy frameworks
    domain: "A.5"
    security_domains:
      - authentication
      - access_control
      - logging_monitoring
      - vulnerability_management
      - data_protection
      - supplier_management
      - incident_management
      - business_continuity
    control_type: preventive
    cia:
      - confidentiality
      - integrity
      - availability
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.1 Policies for information security: An information security policy and topic-specific
      policies shall be defined, approved by management, published, communicated to relevant
      personnel, and reviewed at planned intervals.

      A.5.2 Information security roles and responsibilities: Information security roles and
      responsibilities shall be defined and allocated according to the organisation's needs.

      A.5.9 Inventory of information and other associated assets: An inventory of information
      and other associated assets shall be developed, maintained, and regularly updated.

      A.5.14 Information transfer: Information transfer rules, procedures, or agreements shall
      be in place for all types of transfer facilities within the organisation and between the
      organisation and other parties.

      A.5.19 Information security in supplier relationships: Processes and procedures shall be
      defined and implemented to manage the information security risks associated with the use
      of supplier products or services.

      A.5.23 Information security for use of cloud services: Processes for acquisition, use,
      management, and exit from cloud services shall be established, considering information
      security requirements.

      A.5.24 Information security incident management planning and preparation: The organisation
      shall plan and prepare for managing information security incidents by defining, establishing,
      and communicating incident management processes, roles, and responsibilities.

      A.5.29 Information security during disruption: The organisation shall plan how to maintain
      information security at an appropriate level during disruption.

      A.5.30 ICT readiness for business continuity: ICT readiness shall be planned, implemented,
      maintained, and tested based on business continuity objectives and ICT continuity requirements.

      A.5.36 Compliance with policies, rules, and standards for information security: Compliance
      with the information security policy, topic-specific policies, rules, and standards shall
      be regularly reviewed.

  # ---------------------------------------------------------------------------
  # A.6 — People Controls (8 controls)
  # Covers screening, employment conditions, awareness and training, disciplinary
  # processes, confidentiality agreements, and remote working.
  # ---------------------------------------------------------------------------

  - name: people_controls
    description: ISO 27001 Annex A.6 people controls covering personnel security before, during, and after employment
    domain: "A.6"
    security_domains:
      - people_controls
    control_type: preventive
    cia:
      - confidentiality
      - integrity
      - availability
    cybersecurity_concept: identify
    operational_capability: human_resource_security
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.6.1 Screening: Background verification checks shall be carried out on candidates
      prior to joining the organisation and on an ongoing basis, considering applicable laws,
      regulations, and proportional to business requirements and risks.

      A.6.2 Terms and conditions of employment: Employment contractual agreements shall state
      the personnel's and the organisation's responsibilities for information security.

      A.6.3 Information security awareness, education, and training: Personnel and relevant
      interested parties shall receive appropriate information security awareness, education,
      and training, and regular updates of the organisation's information security policy,
      topic-specific policies, and procedures.

      A.6.4 Disciplinary process: A disciplinary process shall be formalised and communicated
      to take actions against personnel and other relevant interested parties who have committed
      an information security policy violation.

      A.6.5 Responsibilities after termination or change of employment: Information security
      responsibilities and duties that remain valid after termination or change of employment
      shall be defined, enforced, and communicated to relevant personnel.

      A.6.6 Confidentiality or non-disclosure agreements: Confidentiality or non-disclosure
      agreements reflecting the organisation's needs for the protection of information shall
      be identified, documented, regularly reviewed, and signed by personnel and other relevant
      interested parties.

      A.6.7 Remote working: Security measures shall be implemented when personnel are working
      remotely to protect information accessed, processed, or stored outside the organisation's
      premises.

      A.6.8 Information security event reporting: The organisation shall provide a mechanism
      for personnel to report observed or suspected information security events through
      appropriate channels in a timely manner.

  # ---------------------------------------------------------------------------
  # A.7 — Physical Controls (14 controls)
  # Covers physical security perimeters, entry controls, clear desk and screen
  # policies, equipment protection, and storage media security.
  # ---------------------------------------------------------------------------

  - name: physical_controls
    description: ISO 27001 Annex A.7 physical controls covering premises security, equipment protection, and secure working environments
    domain: "A.7"
    security_domains:
      - physical_security
    control_type: preventive
    cia:
      - confidentiality
      - availability
    cybersecurity_concept: protect
    operational_capability: physical_security
    iso_security_domain: protection
    guidance_text: |
      A.7.1 Physical security perimeters: Security perimeters shall be defined and used to
      protect areas that contain information and other associated assets.

      A.7.2 Physical entry: Secure areas shall be protected by appropriate entry controls and
      access points to ensure only authorised personnel are allowed access.

      A.7.3 Securing offices, rooms, and facilities: Physical security for offices, rooms,
      and facilities shall be designed and implemented.

      A.7.4 Physical security monitoring: Premises shall be continuously monitored for
      unauthorised physical access.

      A.7.7 Clear desk and clear screen: Clear desk rules for papers and removable storage
      media and clear screen rules for information processing facilities shall be defined
      and appropriately enforced.

      A.7.8 Equipment siting and protection: Equipment shall be sited securely and protected
      to reduce the risks from physical and environmental threats and from unauthorised access
      and interference.

      A.7.10 Storage media: Storage media shall be managed through their life cycle of
      acquisition, use, transportation, and disposal in accordance with the organisation's
      classification scheme and handling requirements.

      A.7.11 Supporting utilities: Information processing facilities shall be protected from
      power failures and other disruptions caused by failures in supporting utilities.

      A.7.14 Secure disposal or re-use of equipment: Items of equipment containing storage
      media shall be verified to ensure that any sensitive data and licensed software has been
      removed or securely overwritten prior to disposal or re-use.

  # ---------------------------------------------------------------------------
  # A.8 — Technological Controls (34 controls)
  # Covers endpoint security, access management, cryptography, secure development,
  # configuration management, vulnerability management, and network security.
  # ---------------------------------------------------------------------------

  - name: technological_controls
    description: ISO 27001 Annex A.8 technological controls covering system security, cryptography, vulnerability management, and network protection
    domain: "A.8"
    security_domains:
      - encryption
      - network_security
      - data_protection
      - vulnerability_management
      - logging_monitoring
    control_type: preventive
    cia:
      - confidentiality
      - integrity
    cybersecurity_concept: protect
    operational_capability: system_and_network_protection
    iso_security_domain: protection
    guidance_text: |
      A.8.2 Privileged access rights: The allocation and use of privileged access rights
      shall be restricted and managed.

      A.8.3 Information access restriction: Access to information and other associated assets
      shall be restricted in accordance with the established topic-specific policy on access control.

      A.8.5 Secure authentication: Secure authentication technologies and procedures shall be
      implemented based on information access restrictions and the topic-specific policy on
      access control.

      A.8.7 Protection against malware: Protection against malware shall be implemented and
      supported by appropriate user awareness.

      A.8.8 Management of technical vulnerabilities: Information about technical vulnerabilities
      of information systems in use shall be obtained in a timely fashion, the organisation's
      exposure to such vulnerabilities shall be evaluated, and appropriate measures taken.

      A.8.15 Logging: Logs that record activities, exceptions, faults, and other relevant
      events shall be produced, stored, protected, and analysed.

      A.8.20 Networks security: Networks and network devices shall be secured, managed, and
      controlled to protect information in systems and applications.

      A.8.24 Use of cryptography: Rules for the effective use of cryptography, including
      cryptographic key management, shall be defined and implemented.

      A.8.25 Secure development life cycle: Rules for the secure development of software and
      systems shall be established and applied.

      A.8.28 Secure coding: Secure coding principles shall be applied to software development.

      A.8.32 Change management: Changes to information processing facilities and information
      systems shall be subject to change management procedures.
