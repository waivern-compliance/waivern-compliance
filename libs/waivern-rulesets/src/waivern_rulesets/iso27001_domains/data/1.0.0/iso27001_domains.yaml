# ISO 27001 Domains Ruleset
# One rule per individual ISO 27001:2022 Annex A control (93 rules total).
# Each rule carries the five ISO 27001 control attributes and guidance text
# used by ControlAssessor to structure LLM prompts and populate
# control_assessment schema fields.
#
# DISCLAIMER: The guidance text in this file is derived from publicly available
# summaries and paraphrases of ISO 27001:2022. It is NOT a copy of the official
# ISO 27001 standard text, which is a licensed publication. For authoritative,
# verbatim control text, switch to the rag/ provider URI:
#   domain_ruleset: "rag/iso27001_domains/1.0.0"
#
# Field semantics:
# - security_domains: taxonomy domains of evidence relevant to this control.
#     Every rule has at least one domain. Organisational controls use governance,
#     asset_management, or legal_compliance. Physical controls use [physical_security]
#     because document evidence from physical security policies carries that domain.
# - evidence_source: origin types of evidence (TECHNICAL | DOCUMENT).
#     TECHNICAL covers both CODE and CONFIG. Orthogonal to security_domains.
# - evidence_required: mandatory evidence types for mixed-source controls.
#     Only set when evidence_source has multiple types but one is mandatory
#     (e.g. access control needs DOCUMENT even when TECHNICAL evidence exists).

name: iso27001_domains
version: 1.0.0
description: ISO 27001:2022 Annex A individual control definitions with control attributes and LLM guidance text

rules:

  # ===========================================================================
  # A.5 — Organisational Controls (A.5.1–A.5.37, 37 controls)
  # ===========================================================================

  - name: information_security_policies
    description: Policies for information security shall be defined, approved, published and reviewed
    control_ref: "A.5.1"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.1 Policies for information security: An information security policy and
      topic-specific policies shall be defined, approved by management, published,
      communicated to relevant personnel and interested parties, and reviewed at
      planned intervals or when significant changes occur.

  - name: information_security_roles_and_responsibilities
    description: Information security roles and responsibilities shall be defined and allocated
    control_ref: "A.5.2"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.2 Information security roles and responsibilities: Information security
      roles and responsibilities shall be defined and allocated according to the
      organisation's needs.

  - name: segregation_of_duties
    description: Conflicting duties and areas of responsibility shall be segregated
    control_ref: "A.5.3"
    security_domains: [access_control]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: access_control
    iso_security_domain: protection
    guidance_text: |
      A.5.3 Segregation of duties: Conflicting duties and conflicting areas of
      responsibility shall be segregated to reduce opportunities for unauthorised
      or unintentional modification or misuse of the organisation's assets.

  - name: management_responsibilities
    description: Management shall require all personnel to apply information security in accordance with policy
    control_ref: "A.5.4"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.4 Management responsibilities: Management shall require all personnel
      to apply information security in accordance with the established information
      security policy, topic-specific policies and procedures of the organisation.

  - name: contact_with_authorities
    description: The organisation shall establish and maintain contact with relevant authorities
    control_ref: "A.5.5"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: respond
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.5 Contact with authorities: The organisation shall establish and maintain
      contact with relevant authorities (e.g. law enforcement, regulatory bodies)
      and share information as required by legal and regulatory obligations.

  - name: contact_with_special_interest_groups
    description: The organisation shall establish and maintain contact with special interest groups
    control_ref: "A.5.6"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.6 Contact with special interest groups: The organisation shall establish
      and maintain contact with special interest groups or other specialist security
      forums and professional associations.

  - name: threat_intelligence
    description: Information about information security threats shall be collected and analysed
    control_ref: "A.5.7"
    security_domains: [vulnerability_management]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: threat_and_vulnerability_management
    iso_security_domain: defence
    guidance_text: |
      A.5.7 Threat intelligence: Information relating to information security
      threats shall be collected and analysed to produce threat intelligence in
      order to be used in the risk assessment and risk treatment process.

  - name: information_security_in_project_management
    description: Information security shall be integrated into project management
    control_ref: "A.5.8"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.8 Information security in project management: Information security shall
      be integrated into project management throughout the project life cycle.

  - name: inventory_of_information_and_associated_assets
    description: An inventory of information and associated assets shall be developed and maintained
    control_ref: "A.5.9"
    security_domains: [asset_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: asset_management
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.9 Inventory of information and other associated assets: An inventory
      of information and other associated assets, including owners, shall be
      developed and maintained.

  - name: acceptable_use_of_information_and_assets
    description: Rules for acceptable use and procedures for handling information and assets shall be identified
    control_ref: "A.5.10"
    security_domains: [asset_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: asset_management
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.10 Acceptable use of information and other associated assets: Rules for
      the acceptable use and procedures for handling information and other associated
      assets shall be identified, documented and implemented.

  - name: return_of_assets
    description: Personnel and external parties shall return all assets upon termination
    control_ref: "A.5.11"
    security_domains: [asset_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: asset_management
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.11 Return of assets: Personnel and other interested parties shall return
      all the organisation's assets in their possession upon change or termination
      of their employment, contract or agreement.

  - name: classification_of_information
    description: Information shall be classified according to the information security needs of the organisation
    control_ref: "A.5.12"
    security_domains: [data_protection]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: identify
    operational_capability: information_protection
    iso_security_domain: protection
    guidance_text: |
      A.5.12 Classification of information: Information shall be classified
      according to the information security needs of the organisation based on
      confidentiality, integrity, availability and relevant interested party
      requirements.

  - name: labelling_of_information
    description: An appropriate set of procedures for information labelling shall be developed and implemented
    control_ref: "A.5.13"
    security_domains: [data_protection]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: information_protection
    iso_security_domain: protection
    guidance_text: |
      A.5.13 Labelling of information: An appropriate set of procedures for
      information labelling shall be developed and implemented in accordance with
      the information classification scheme adopted by the organisation.

  - name: information_transfer
    description: Information transfer rules and procedures shall be in place for all transfer facilities
    control_ref: "A.5.14"
    security_domains: [data_protection]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: information_protection
    iso_security_domain: protection
    guidance_text: |
      A.5.14 Information transfer: Information transfer rules, procedures or
      agreements shall be in place for all types of transfer facilities within
      the organisation and between the organisation and other parties.

  - name: access_control
    description: Rules to control physical and logical access to information and assets shall be established
    control_ref: "A.5.15"
    security_domains: [access_control]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: access_control
    iso_security_domain: protection
    guidance_text: |
      A.5.15 Access control: Rules to control physical and logical access to
      information and other associated assets shall be established and implemented
      based on business and information security requirements.

  - name: identity_management
    description: The full life cycle of identities shall be managed
    control_ref: "A.5.16"
    security_domains: [authentication]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: identity_and_access_management
    iso_security_domain: protection
    guidance_text: |
      A.5.16 Identity management: The full life cycle of identities shall be
      managed including registration, credential issuance, re-certification, and
      removal of identities for users and non-human entities.

  - name: authentication_information
    description: Allocation and management of authentication information shall be controlled by a management process
    control_ref: "A.5.17"
    security_domains: [authentication]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: identity_and_access_management
    iso_security_domain: protection
    guidance_text: |
      A.5.17 Authentication information: Allocation and management of
      authentication information shall be controlled by a management process,
      including advising personnel on appropriate handling of authentication
      information.

  - name: access_rights
    description: Access rights to information and assets shall be provisioned, reviewed, modified and removed
    control_ref: "A.5.18"
    security_domains: [access_control]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: access_control
    iso_security_domain: protection
    guidance_text: |
      A.5.18 Access rights: Access rights to information and other associated
      assets shall be provisioned, reviewed, modified and removed in accordance
      with the organisation's topic-specific policy on and rules for access control.

  - name: information_security_in_supplier_relationships
    description: Processes to manage information security risks in supplier use shall be defined and implemented
    control_ref: "A.5.19"
    security_domains: [supplier_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: supplier_relationships
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.19 Information security in supplier relationships: Processes and
      procedures shall be defined and implemented to manage the information
      security risks associated with the use of supplier's products or services.

  - name: addressing_information_security_in_supplier_agreements
    description: Relevant information security requirements shall be established and agreed with each supplier
    control_ref: "A.5.20"
    security_domains: [supplier_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: supplier_relationships
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.20 Addressing information security within supplier agreements: Relevant
      information security requirements shall be established and agreed with each
      supplier based on the type of supplier relationship.

  - name: managing_information_security_in_ict_supply_chain
    description: Processes to manage information security risks in the ICT supply chain shall be defined
    control_ref: "A.5.21"
    security_domains: [supplier_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: supplier_relationships
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.21 Managing information security in the ICT supply chain: Processes and
      procedures shall be defined and implemented to manage the information security
      risks associated with the ICT products and services supply chain.

  - name: monitoring_and_review_of_supplier_services
    description: The organisation shall regularly monitor, review and audit supplier service delivery
    control_ref: "A.5.22"
    security_domains: [supplier_management]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: supplier_relationships
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.22 Monitoring, review and change management of supplier services: The
      organisation shall regularly monitor, review, evaluate and manage change in
      supplier information security practices and service delivery.

  - name: information_security_for_cloud_services
    description: Processes for cloud service acquisition, use, management and exit shall be established
    control_ref: "A.5.23"
    security_domains: [supplier_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: supplier_relationships
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.23 Information security for use of cloud services: Processes for
      acquisition, use, management and exit from cloud services shall be
      established in accordance with the organisation's information security
      requirements.

  - name: information_security_incident_management_planning
    description: The organisation shall plan and prepare for managing information security incidents
    control_ref: "A.5.24"
    security_domains: [incident_management]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: respond
    operational_capability: event_and_incident_management
    iso_security_domain: defence
    guidance_text: |
      A.5.24 Information security incident management planning and preparation:
      The organisation shall plan and prepare for managing information security
      incidents by defining, establishing and communicating incident management
      processes, roles and responsibilities.

  - name: assessment_of_information_security_events
    description: The organisation shall assess information security events and decide if they are incidents
    control_ref: "A.5.25"
    security_domains: [incident_management]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: detect
    operational_capability: event_and_incident_management
    iso_security_domain: defence
    guidance_text: |
      A.5.25 Assessment and decision on information security events: The
      organisation shall assess information security events and decide if they
      are to be categorised as information security incidents.

  - name: response_to_information_security_incidents
    description: Information security incidents shall be responded to in accordance with documented procedures
    control_ref: "A.5.26"
    security_domains: [incident_management]
    evidence_source: [DOCUMENT]
    control_type: corrective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: respond
    operational_capability: event_and_incident_management
    iso_security_domain: defence
    guidance_text: |
      A.5.26 Response to information security incidents: Information security
      incidents shall be responded to in accordance with the documented procedures.

  - name: learning_from_information_security_incidents
    description: Knowledge gained from incidents shall be used to improve controls
    control_ref: "A.5.27"
    security_domains: [incident_management]
    evidence_source: [DOCUMENT]
    control_type: corrective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: recover
    operational_capability: event_and_incident_management
    iso_security_domain: defence
    guidance_text: |
      A.5.27 Learning from information security incidents: Knowledge gained from
      information security incidents shall be used to strengthen and improve the
      information security controls.

  - name: collection_of_evidence
    description: The organisation shall establish and apply procedures for identification and collection of evidence
    control_ref: "A.5.28"
    security_domains: [incident_management]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity]
    cybersecurity_concept: respond
    operational_capability: event_and_incident_management
    iso_security_domain: defence
    guidance_text: |
      A.5.28 Collection of evidence: The organisation shall establish and apply
      procedures for the identification, collection, acquisition and preservation
      of evidence related to information security events.

  - name: information_security_during_disruption
    description: The organisation shall plan how to maintain information security during disruption
    control_ref: "A.5.29"
    security_domains: [business_continuity]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [availability, confidentiality]
    cybersecurity_concept: recover
    operational_capability: continuity
    iso_security_domain: resilience
    guidance_text: |
      A.5.29 Information security during disruption: The organisation shall plan
      how to maintain information security at an appropriate level during disruption.

  - name: ict_readiness_for_business_continuity
    description: ICT readiness shall be planned, implemented and tested based on continuity objectives
    control_ref: "A.5.30"
    security_domains: [business_continuity]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [availability]
    cybersecurity_concept: recover
    operational_capability: continuity
    iso_security_domain: resilience
    guidance_text: |
      A.5.30 ICT readiness for business continuity: ICT readiness shall be
      planned, implemented, maintained and tested based on business continuity
      objectives and ICT continuity requirements.

  - name: legal_statutory_regulatory_contractual_requirements
    description: Legal, statutory, regulatory and contractual requirements shall be identified and documented
    control_ref: "A.5.31"
    security_domains: [legal_compliance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: compliance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.31 Legal, statutory, regulatory and contractual requirements: Legal,
      statutory, regulatory and contractual requirements relevant to information
      security and the organisation's approach to meet these requirements shall
      be identified, documented and kept up to date.

  - name: intellectual_property_rights
    description: The organisation shall implement procedures to protect intellectual property rights
    control_ref: "A.5.32"
    security_domains: [legal_compliance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
    operational_capability: compliance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.32 Intellectual property rights: The organisation shall implement
      appropriate procedures to protect intellectual property rights.

  - name: protection_of_records
    description: Records shall be protected from loss, destruction, falsification and unauthorised access
    control_ref: "A.5.33"
    security_domains: [data_protection]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: information_protection
    iso_security_domain: protection
    guidance_text: |
      A.5.33 Protection of records: Records shall be protected from loss,
      destruction, falsification, unauthorised access and unauthorised release,
      in accordance with legal, statutory, regulatory, contractual and business
      requirements.

  - name: privacy_and_protection_of_pii
    description: The organisation shall identify and meet requirements for privacy and PII protection
    control_ref: "A.5.34"
    security_domains: [data_protection]
    evidence_source: [TECHNICAL, DOCUMENT]
    evidence_required: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality]
    cybersecurity_concept: protect
    operational_capability: privacy
    iso_security_domain: protection
    guidance_text: |
      A.5.34 Privacy and protection of personally identifiable information (PII):
      The organisation shall identify and meet the requirements regarding the
      preservation of privacy and protection of PII according to applicable laws
      and regulations and contractual requirements.

  - name: independent_review_of_information_security
    description: The organisation's approach to managing information security shall be reviewed independently
    control_ref: "A.5.35"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: assurance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.35 Independent review of information security: The organisation's
      approach to managing information security and its implementation shall
      be reviewed independently at planned intervals or when significant changes
      occur.

  - name: compliance_with_policies_and_standards
    description: Compliance with information security policy, standards and rules shall be regularly reviewed
    control_ref: "A.5.36"
    security_domains: [legal_compliance]
    evidence_source: [DOCUMENT]
    control_type: detective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: identify
    operational_capability: compliance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.36 Compliance with policies, rules and standards for information
      security: Compliance with the organisation's information security policy,
      topic-specific policies, rules and standards shall be regularly reviewed.

  - name: documented_operating_procedures
    description: Operating procedures for information processing facilities shall be documented and made available
    control_ref: "A.5.37"
    security_domains: [governance]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: governance
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.5.37 Documented operating procedures: Operating procedures for
      information processing facilities shall be documented and made available
      to personnel who need them.

  # ===========================================================================
  # A.6 — People Controls (A.6.1–A.6.8, 8 controls)
  # ===========================================================================

  - name: screening
    description: Background verification checks on candidates shall be carried out prior to joining
    control_ref: "A.6.1"
    security_domains: [people_controls]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: identify
    operational_capability: human_resource_security
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.6.1 Screening: Background verification checks on all candidates to
      become personnel shall be carried out prior to joining the organisation
      and on an ongoing basis, taking into consideration applicable laws,
      regulations and ethics, proportional to the business requirements, the
      classification of the information to be accessed and the perceived risks.

  - name: terms_and_conditions_of_employment
    description: Employment contractual agreements shall state personnel information security responsibilities
    control_ref: "A.6.2"
    security_domains: [people_controls]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: human_resource_security
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.6.2 Terms and conditions of employment: Employment contractual agreements
      shall state the personnel's and the organisation's responsibilities for
      information security.

  - name: information_security_awareness_education_and_training
    description: Personnel shall receive appropriate information security awareness, education and training
    control_ref: "A.6.3"
    security_domains: [people_controls]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: protect
    operational_capability: human_resource_security
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.6.3 Information security awareness, education and training: Personnel
      and relevant interested parties shall receive appropriate information
      security awareness, education and training and regular updates of the
      organisation's information security policy, topic-specific policies and
      procedures, as relevant for their job function.

  - name: disciplinary_process
    description: A disciplinary process shall be formalised to take actions against personnel committing violations
    control_ref: "A.6.4"
    security_domains: [people_controls]
    evidence_source: [DOCUMENT]
    control_type: corrective
    cia: [confidentiality, integrity, availability]
    cybersecurity_concept: respond
    operational_capability: human_resource_security
    iso_security_domain: governance_and_ecosystem
    guidance_text: |
      A.6.4 Disciplinary process: A disciplinary process shall be formalised
      and communicated to take actions against personnel who have committed an
      information security policy violation.

  - name: responsibilities_after_termination_or_change_of_employment
    description: Information security responsibilities remaining valid after termination shall be enforced
    control_ref: "A.6.5"
    security_domains: [people_controls]
    evidence_source: [DOCUMENT]
    control_type: preventive
    cia: [confidentiality, integrity]
    cybersecurity_concept: protect
