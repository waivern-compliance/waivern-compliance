# Processing Purposes Detection Ruleset
# Framework-agnostic patterns for detecting data processing purposes
# Regulatory classification is performed by downstream classifiers (e.g., GDPR classifier)

name: processing_purposes
version: 1.0.0
description: Ruleset for detecting processing purpose patterns in source code and documents

# Master list of valid processing purpose names (human-readable)
# Each rule's name must match an entry in this list
purposes:
  # AI and Machine Learning
  - Artificial Intelligence Model Training
  - Artificial Intelligence Bias Testing
  - Artificial Intelligence Model Refinement
  - Artificial Intelligence Performance Testing
  - Artificial Intelligence Security Testing
  - Artificial Intelligence Compliance Management
  # Operational
  - General Product and Service Delivery
  - Customer Service and Support
  - Customization of Products and Services
  - User Identity and Login Management
  - Payment, Billing, and Invoicing
  # Analytics
  - Behavioral Data Analysis for Product Improvement
  # Marketing and Advertising
  - Dynamic Personalization of Products and Services
  - Consumer Marketing Within Owned Products
  - Targeted Marketing via Third-Party Platforms
  - Third-Party Marketing via Owned Products
  # Security
  - Security, Fraud Prevention, and Abuse Detection
  # Security Operations and Controls
  - Audit Logging and Event Tracking
  - Access Control and Permissions Management
  - Network Access Control and Security
  - Supplier and Vendor Integration Management
  - Incident Response and Error Management
  - Data Backup and Disaster Recovery
  - Input Validation and Sanitisation

# Master list of valid purpose slugs (snake_case, used in findings output)
# Each rule's purpose must match an entry in this list
purpose_slugs:
  - ai_model_training
  - ai_bias_testing
  - ai_model_refinement
  - ai_performance_testing
  - ai_security_testing
  - ai_compliance_management
  - product_service_delivery
  - customer_service_support
  - product_customisation
  - user_identity_login
  - payment_billing
  - behavioral_analytics
  - dynamic_personalisation
  - consumer_marketing
  - third_party_targeted_marketing
  - third_party_marketing
  - security_fraud_prevention
  - audit_logging
  - access_control_management
  - network_access_control
  - supplier_vendor_management
  - incident_response
  - data_backup_recovery
  - input_validation_sanitisation

