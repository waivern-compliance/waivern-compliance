# GDPR Processing Purpose Classification Ruleset
# Maps processing purpose indicators to GDPR classifications

name: "gdpr_processing_purpose_classification"
version: "1.0.0"
description: "Maps processing purpose indicators to GDPR classification"

# Master list of valid GDPR purpose categories (for reporting/governance)
purpose_categories:
  - ai_and_ml
  - analytics
  - marketing_and_advertising
  - operational
  - security

# Valid indicator purposes — must use purpose slugs (snake_case) as output
# by the processing_purpose analyser, NOT display names.
indicator_purposes:
  # AI and Machine Learning
  - ai_model_training
  - ai_bias_testing
  - ai_model_refinement
  - ai_performance_testing
  - ai_security_testing
  - ai_compliance_management
  # Operational
  - product_service_delivery
  - customer_service_support
  - product_customisation
  - user_identity_login
  - payment_billing
  # Analytics
  - behavioral_analytics
  # Marketing and Advertising
  - dynamic_personalisation
  - consumer_marketing
  - third_party_targeted_marketing
  - third_party_marketing
  # Security
  - security_fraud_prevention
  - audit_logging
  - access_control_management
  - network_access_control
  - supplier_vendor_management
  - incident_response
  - data_backup_recovery
  - input_validation_sanitisation

# Categories considered privacy-sensitive (require extra scrutiny)
sensitive_categories:
  - ai_and_ml
  - analytics
  - marketing_and_advertising

rules:
  # =============================================================================
  # AI and Machine Learning Purposes
  # =============================================================================

  - name: "AI and Machine Learning"
    description: "Processing for AI/ML model training, testing, and refinement"
    purpose_category: "ai_and_ml"
    article_references:
      - "Article 22"
      - "Article 35"
      - "Recital 71"
    typical_lawful_bases:
      - "consent"
      - "legitimate_interests"
    sensitive_purpose: true
    dpia_recommendation: "required"
    indicator_purposes:
      - ai_model_training
      - ai_bias_testing
      - ai_model_refinement
      - ai_performance_testing
      - ai_security_testing
      - ai_compliance_management

  # =============================================================================
  # Analytics Purposes
  # =============================================================================

  - name: "Analytics and Profiling"
    description: "Processing for behavioural analysis, profiling, and personalisation"
    purpose_category: "analytics"
    article_references:
      - "Article 22"
      - "Article 35"
      - "Recital 71"
      - "Recital 72"
    typical_lawful_bases:
      - "consent"
      - "legitimate_interests"
    sensitive_purpose: true
    dpia_recommendation: "recommended"
    indicator_purposes:
      - behavioral_analytics
      - dynamic_personalisation

  # =============================================================================
  # Marketing and Advertising Purposes
  # =============================================================================

  - name: "Marketing and Advertising"
    description: "Processing for marketing, advertising, and promotional activities"
    purpose_category: "marketing_and_advertising"
    article_references:
      - "Article 6(1)(a)"
      - "Article 7"
      - "Article 21"
      - "Recital 47"
    typical_lawful_bases:
      - "consent"
      - "legitimate_interests"
    sensitive_purpose: true
    dpia_recommendation: "recommended"
    indicator_purposes:
      - consumer_marketing
      - third_party_targeted_marketing
      - third_party_marketing

  # =============================================================================
  # Operational Purposes
  # =============================================================================

  - name: "Service Delivery"
    description: "Processing for core product and service delivery"
    purpose_category: "operational"
    article_references:
      - "Article 6(1)(b)"
    typical_lawful_bases:
      - "contract"
      - "legitimate_interests"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - product_service_delivery
      - product_customisation

  - name: "Customer Support"
    description: "Processing for customer service and support activities"
    purpose_category: "operational"
    article_references:
      - "Article 6(1)(b)"
      - "Article 6(1)(f)"
    typical_lawful_bases:
      - "contract"
      - "legitimate_interests"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - customer_service_support

  - name: "Identity Management"
    description: "Processing for user authentication and identity verification"
    purpose_category: "operational"
    article_references:
      - "Article 6(1)(b)"
      - "Article 32"
    typical_lawful_bases:
      - "contract"
      - "legal_obligation"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - user_identity_login

  - name: "Payment Processing"
    description: "Processing for billing, invoicing, and payment transactions"
    purpose_category: "operational"
    article_references:
      - "Article 6(1)(b)"
      - "Article 6(1)(c)"
    typical_lawful_bases:
      - "contract"
      - "legal_obligation"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - payment_billing

  - name: "Supplier and Vendor Management"
    description: "Processing for managing third-party supplier and vendor integrations"
    purpose_category: "operational"
    article_references:
      - "Article 6(1)(b)"
      - "Article 6(1)(f)"
      - "Article 28"
    typical_lawful_bases:
      - "contract"
      - "legitimate_interests"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - supplier_vendor_management

  # =============================================================================
  # Security Purposes
  # =============================================================================

  - name: "Security and Fraud Prevention"
    description: "Processing for security, fraud prevention, and abuse detection"
    purpose_category: "security"
    article_references:
      - "Article 6(1)(f)"
      - "Article 32"
      - "Recital 49"
    typical_lawful_bases:
      - "legitimate_interests"
      - "legal_obligation"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - security_fraud_prevention
      - access_control_management
      - network_access_control

  - name: "Audit and Compliance"
    description: "Processing for audit logging, incident response, and regulatory compliance"
    purpose_category: "security"
    article_references:
      - "Article 5(2)"
      - "Article 6(1)(c)"
      - "Article 30"
      - "Article 33"
    typical_lawful_bases:
      - "legal_obligation"
      - "legitimate_interests"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - audit_logging
      - incident_response

  - name: "Data Resilience"
    description: "Processing for data backup, disaster recovery, and input validation"
    purpose_category: "security"
    article_references:
      - "Article 5(1)(f)"
      - "Article 32"
    typical_lawful_bases:
      - "legal_obligation"
      - "legitimate_interests"
    sensitive_purpose: false
    dpia_recommendation: "not_required"
    indicator_purposes:
      - data_backup_recovery
      - input_validation_sanitisation
